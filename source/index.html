<!DOCTYPE html>
<html class="page" lang="ru" data-validate="html">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lifetour</title>
  <link rel="stylesheet" href="sass/style.scss">
</head>

<body class="page__body">
  <header class="header header--menu-closed" data-test="header">
  </header>
  <main class="main-container">
    <h1 class="visually-hidden">Lifetour - организация походов в горы.</h1>
    <section class="callback" data-test="form">
      <div class="callback__wrapper">
        <div class="callback__wysiwyg">
          <h2>Остались вопросы?</h2>
          <p>Заполните форму и&nbsp;наш&nbsp;оператор свяжется с&nbsp;вами&nbsp;для&nbsp;консультации.</p>
        </div>
        <form class="callback__form" action="https://echo.htmlacademy.ru/" method="post" novalidate>
          <fieldset class="callback__group">
            <legend class="visually-hidden">Контактные данные.</legend>
            <ul class="callback__list">
              <li class="callback__item input-text">
                <label class="callback__label input-text__label" for="phone">Телефон</label>
                <input class="callback__input callback__input--phone input-text__input" type="tel" name="phone" id="phone" placeholder="+7 (000)-000-00-00" required>
              </li>
              <li class="callback__item input-text">
                <label class="callback__label input-text__label" for="email">Email</label>
                <input class="callback__input callback__input--name input-text__input" type="email" name="email" id="email" placeholder="mail@example.com" required>
              </li>
            </ul>
          </fieldset>
          <button class="callback__button button" type="submit">Отправить</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="footer" data-test="footer">
  </footer>
